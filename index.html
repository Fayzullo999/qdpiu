                return; // Qidiruv bo'sh bo'lsa, hech narsa chiqmaydi
            }

            // Ma'lumotlarni filtrlash
            const filteredResults = myFilesData.filter(item => 
                item.title.toLowerCase().includes(query) || 
                item.content.toLowerCase().includes(query)
            );

            // Natijalarni ekranga chiqarish
            if (filteredResults.length > 0) {
                filteredResults.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `<h3>${item.title}</h3><p>${item.content}</p>`;
                    resultsList.appendChild(card);
                });
            } else {
                resultsList.innerHTML = `<p class="no-results">Afsus, hech qanday ma'lumot topilmadi.</p>`;
            }
        }
    </script>

</body>
</html>
